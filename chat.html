<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat — RoommateSync AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #070b17;
      --bg2:      #0c1120;
      --violet:   #7c5cfc;
      --violet2:  #9b7ffe;
      --sky:      #38bdf8;
      --rose:     #f472b6;
      --teal:     #2dd4bf;
      --green:    #22c55e;
      --glass:    rgba(255,255,255,0.045);
      --glass-hi: rgba(255,255,255,0.08);
      --border:   rgba(255,255,255,0.08);
      --bhi:      rgba(255,255,255,0.13);
      --bact:     rgba(124,92,252,0.55);
      --w80:      rgba(255,255,255,0.80);
      --w60:      rgba(255,255,255,0.60);
      --w40:      rgba(255,255,255,0.40);
      --w20:      rgba(255,255,255,0.20);
      --w10:      rgba(255,255,255,0.10);
      --w06:      rgba(255,255,255,0.06);
      --fh:       'Outfit', sans-serif;
      --fb:       'DM Sans', sans-serif;
    }
    html,body{ height:100%;width:100%;background:var(--bg);color:#fff;font-family:var(--fb);font-size:14px;overflow:hidden; }

    /* ORBS */
    .orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
    .orb{position:absolute;border-radius:50%;filter:blur(110px);}
    .o1{width:620px;height:620px;background:var(--violet);opacity:.20;top:-220px;left:-160px;animation:od 22s ease-in-out infinite alternate;}
    .o2{width:480px;height:480px;background:var(--sky);opacity:.17;bottom:-120px;right:-80px;animation:od 17s ease-in-out infinite alternate-reverse;}
    .o3{width:340px;height:340px;background:var(--rose);opacity:.13;top:42%;left:32%;animation:od 26s ease-in-out infinite alternate;}
    .o4{width:270px;height:270px;background:var(--teal);opacity:.11;bottom:22%;right:28%;animation:od 20s ease-in-out infinite alternate-reverse;}
    @keyframes od{0%{transform:translate(0,0)scale(1)}50%{transform:translate(35px,-28px)scale(1.08)}100%{transform:translate(-22px,38px)scale(.93)}}

    /* ROOT */
    .root{position:relative;z-index:1;height:100dvh;display:flex;flex-direction:column;}

    /* TOPNAV */
    .topnav{
      height:56px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
      padding:0 22px;background:rgba(7,11,23,.88);backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
    }
    .logo{
      font-family:var(--fh);font-weight:800;font-size:1.12rem;letter-spacing:-.4px;
      background:linear-gradient(120deg,var(--violet),var(--sky));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      text-decoration:none;user-select:none;
    }
    .nav-r{display:flex;align-items:center;gap:10px;}
    .ai-badge{
      padding:5px 12px;border-radius:50px;font-family:var(--fh);font-size:.72rem;font-weight:700;letter-spacing:.4px;
      background:linear-gradient(120deg,rgba(124,92,252,.25),rgba(56,189,248,.18));
      border:1px solid rgba(124,92,252,.4);color:var(--violet2);
    }
    .nav-pill{
      display:flex;align-items:center;gap:6px;padding:7px 15px;border-radius:50px;
      border:1px solid var(--bhi);background:var(--w06);
      color:var(--w60);font-size:.82rem;font-weight:500;cursor:pointer;text-decoration:none;
      transition:all .2s;
    }
    .nav-pill:hover{background:rgba(124,92,252,.18);border-color:var(--violet);color:#fff;}
    .nav-pill svg{width:13px;height:13px;stroke:currentColor;}

    /* MAIN */
    .main{flex:1;min-height:0;display:flex;padding:14px 18px;gap:14px;}

    /* ── LEFT PANEL ── */
    .pl{
      width:300px;flex-shrink:0;
      background:var(--glass);backdrop-filter:blur(24px);
      border:1px solid var(--border);border-radius:18px;
      display:flex;flex-direction:column;overflow:hidden;
    }
    .pl-head{padding:16px 16px 10px;border-bottom:1px solid var(--border);}
    .pl-label{font-size:.68rem;font-weight:600;letter-spacing:1.2px;color:var(--w40);text-transform:uppercase;margin-bottom:3px;}
    .pl-title{font-family:var(--fh);font-weight:800;font-size:1.5rem;letter-spacing:-.5px;display:flex;align-items:center;justify-content:space-between;}
    .head-acts{display:flex;gap:7px;}
    .ib{
      width:33px;height:33px;border-radius:9px;border:1px solid var(--border);background:var(--w06);
      display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--w60);transition:all .2s;
    }
    .ib:hover{background:rgba(124,92,252,.2);border-color:var(--violet);color:#fff;}
    .ib svg{width:14px;height:14px;stroke:currentColor;}

    .search-wrap{padding:10px 12px;border-bottom:1px solid var(--border);}
    .search-inner{display:flex;align-items:center;gap:7px;background:var(--w06);border:1px solid var(--border);border-radius:10px;padding:7px 11px;transition:border-color .2s;}
    .search-inner:focus-within{border-color:rgba(124,92,252,.4);}
    .search-inner svg{width:13px;height:13px;stroke:var(--w40);flex-shrink:0;}
    .search-inner input{flex:1;background:transparent;border:none;outline:none;color:#fff;font-family:var(--fb);font-size:.83rem;caret-color:var(--violet);}
    .search-inner input::placeholder{color:var(--w40);}

    .match-list{flex:1;overflow-y:auto;padding:7px;}
    .match-list::-webkit-scrollbar{width:3px;}
    .match-list::-webkit-scrollbar-thumb{background:var(--bhi);border-radius:4px;}

    .mi{
      display:flex;align-items:center;gap:11px;padding:10px 9px;border-radius:13px;cursor:pointer;
      border:1px solid transparent;transition:all .18s;margin-bottom:2px;
    }
    .mi:hover{background:var(--glass-hi);border-color:var(--border);}
    .mi.active{background:rgba(124,92,252,.12);border-color:var(--bact);box-shadow:inset 0 0 0 1px rgba(124,92,252,.12);}
    .maw{position:relative;flex-shrink:0;}
    .mav{
      width:44px;height:44px;border-radius:13px;
      background:linear-gradient(135deg,var(--bg2),rgba(124,92,252,.2));
      border:1.5px solid var(--bhi);display:flex;align-items:center;justify-content:center;
      font-size:1.35rem;user-select:none;
    }
    .mi.active .mav{border-color:var(--violet);box-shadow:0 0 14px rgba(124,92,252,.35);}
    .opip{position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid var(--bg);}
    .minf{flex:1;min-width:0;}
    .mname{font-family:var(--fh);font-weight:600;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .mocc{font-size:.73rem;color:var(--w40);margin-top:1px;}
    .mprev{font-size:.71rem;color:var(--w40);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .mmeta{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
    .mscore{font-family:var(--fh);font-size:.7rem;font-weight:700;padding:3px 7px;border-radius:50px;border:1px solid;}
    .shi{color:#4ade80;border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.1);}
    .smi{color:var(--sky);border-color:rgba(56,189,248,.3);background:rgba(56,189,248,.1);}
    .slo{color:var(--rose);border-color:rgba(244,114,182,.3);background:rgba(244,114,182,.1);}
    .mtime{font-size:.67rem;color:var(--w40);}
    .udot{width:7px;height:7px;border-radius:50%;background:var(--violet);box-shadow:0 0 7px var(--violet);}

    /* ── RIGHT PANEL ── */
    .pr{
      flex:1;min-width:0;
      background:var(--glass);backdrop-filter:blur(24px);
      border:1px solid var(--border);border-radius:18px;
      display:flex;flex-direction:column;overflow:hidden;
    }

    /* chat topbar */
    .ct{
      height:64px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
      padding:0 18px;border-bottom:1px solid var(--border);
      background:rgba(255,255,255,.025);
    }
    .ct-l{display:flex;align-items:center;gap:12px;}
    .ctav{
      width:42px;height:42px;border-radius:13px;
      background:linear-gradient(135deg,var(--bg2),rgba(124,92,252,.25));
      border:1.5px solid var(--bhi);
      display:flex;align-items:center;justify-content:center;font-size:1.3rem;
      position:relative;flex-shrink:0;
    }
    .ctav .pip{position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid var(--bg);}
    .cname{font-family:var(--fh);font-weight:700;font-size:.97rem;letter-spacing:-.3px;}
    .cocc{font-size:.74rem;color:var(--w40);margin-top:1px;}
    .cbadge{margin-left:6px;font-family:var(--fh);font-size:.7rem;font-weight:700;padding:3px 8px;border-radius:50px;border:1px solid;}
    .ct-r{display:flex;align-items:center;gap:9px;}
    .online-txt{font-size:.8rem;font-weight:600;color:var(--green);display:flex;align-items:center;gap:5px;}
    .online-txt::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);}

    /* messages */
    .msgs{
      flex:1;min-height:0;overflow-y:auto;
      padding:18px 20px 10px;
      display:flex;flex-direction:column;gap:5px;
      scroll-behavior:smooth;
    }
    .msgs::-webkit-scrollbar{width:3px;}
    .msgs::-webkit-scrollbar-thumb{background:var(--bhi);border-radius:4px;}

    .dsep{display:flex;align-items:center;gap:10px;color:var(--w40);font-size:.7rem;margin:5px 0;}
    .dsep::before,.dsep::after{content:'';flex:1;height:1px;background:var(--border);}

    .mrow{display:flex;align-items:flex-end;gap:8px;}
    .mrow.me{flex-direction:row-reverse;}
    .mrow+.mrow{margin-top:1px;}

    .mav2{
      width:28px;height:28px;border-radius:9px;flex-shrink:0;
      background:linear-gradient(135deg,rgba(124,92,252,.28),rgba(56,189,248,.18));
      border:1px solid var(--bhi);display:flex;align-items:center;justify-content:center;
      font-size:.82rem;user-select:none;
    }
    .mrow.me .mav2{background:linear-gradient(135deg,var(--violet),var(--sky));font-size:.6rem;font-weight:700;color:#fff;border:none;}

    .bcol{display:flex;flex-direction:column;max-width:60%;}
    .mrow.me .bcol{align-items:flex-end;}

    .bub{
      padding:10px 14px;border-radius:17px;font-size:.89rem;line-height:1.58;word-break:break-word;
      animation:bIn .24s cubic-bezier(.22,.68,0,1.15) both;
    }
    @keyframes bIn{from{opacity:0;transform:translateY(8px)scale(.96)}to{opacity:1;transform:none}}
    .mrow.me .bub{
      background:linear-gradient(135deg,var(--violet) 0%,#5eabf5 100%);color:#fff;
      border-bottom-right-radius:5px;box-shadow:0 4px 20px rgba(124,92,252,.4);
    }
    .mrow.other .bub{
      background:rgba(255,255,255,.065);backdrop-filter:blur(10px);
      border:1px solid var(--bhi);color:var(--w80);
      border-bottom-left-radius:5px;box-shadow:0 2px 12px rgba(0,0,0,.25);
    }
    .bts{font-size:.65rem;color:var(--w40);margin-top:3px;padding:0 2px;}

    /* typing */
    .typing-row{display:flex;align-items:center;gap:8px;opacity:0;transition:opacity .2s;pointer-events:none;}
    .typing-row.show{opacity:1;}
    .tbub{
      padding:11px 14px;border-radius:17px;border-bottom-left-radius:5px;
      background:rgba(255,255,255,.065);border:1px solid var(--bhi);
      display:flex;gap:5px;align-items:center;
    }
    .td{width:6px;height:6px;border-radius:50%;background:var(--w40);animation:td 1.1s ease-in-out infinite;}
    .td:nth-child(2){animation-delay:.18s}.td:nth-child(3){animation-delay:.36s}
    @keyframes td{0%,60%,100%{transform:translateY(0);opacity:.35}30%{transform:translateY(-5px);opacity:1}}

    /* empty state */
    .empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;text-align:center;padding:40px;}
    .empty-chat .big{font-size:3rem;}
    .empty-chat h3{font-family:var(--fh);font-weight:700;font-size:1.05rem;color:var(--w80);}
    .empty-chat p{font-size:.83rem;color:var(--w40);max-width:250px;line-height:1.6;}

    /* AI chips */
    .ai-acts{
      padding:10px 18px;display:flex;gap:8px;flex-wrap:wrap;
      border-top:1px solid var(--border);background:rgba(255,255,255,.018);
    }
    .chip{
      display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:50px;cursor:pointer;
      font-size:.76rem;font-weight:500;font-family:var(--fb);border:1px solid;
      transition:all .2s;user-select:none;white-space:nowrap;
    }
    .chip:hover{transform:translateY(-1px);}
    .chip.rose{color:#fb7185;border-color:rgba(251,113,133,.35);background:rgba(251,113,133,.1);}
    .chip.rose:hover{background:rgba(251,113,133,.2);box-shadow:0 4px 15px rgba(251,113,133,.2);}
    .chip.sky{color:var(--sky);border-color:rgba(56,189,248,.35);background:rgba(56,189,248,.1);}
    .chip.sky:hover{background:rgba(56,189,248,.2);box-shadow:0 4px 15px rgba(56,189,248,.2);}
    .chip.teal{color:var(--teal);border-color:rgba(45,212,191,.35);background:rgba(45,212,191,.1);}
    .chip.teal:hover{background:rgba(45,212,191,.2);box-shadow:0 4px 15px rgba(45,212,191,.2);}

    /* input bar */
    .cib{
      padding:11px 14px 13px;border-top:1px solid var(--border);
      display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.02);
    }
    .att{
      width:36px;height:36px;border-radius:11px;flex-shrink:0;
      border:1px solid var(--border);background:var(--w06);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;color:var(--w60);transition:all .2s;
    }
    .att:hover{background:var(--w10);border-color:var(--bhi);color:#fff;}
    .att svg{width:15px;height:15px;stroke:currentColor;}
    .iw{
      flex:1;display:flex;align-items:center;
      background:rgba(255,255,255,.055);border:1px solid var(--bhi);
      border-radius:50px;padding:8px 15px;transition:border-color .25s,box-shadow .25s;
    }
    .iw:focus-within{border-color:rgba(124,92,252,.5);box-shadow:0 0 0 3px rgba(124,92,252,.1);}
    #msgInput{flex:1;background:transparent;border:none;outline:none;color:#fff;font-family:var(--fb);font-size:.89rem;caret-color:var(--violet);}
    #msgInput::placeholder{color:var(--w40);}
    .sbtn{
      height:36px;padding:0 20px;border-radius:50px;flex-shrink:0;border:none;cursor:pointer;
      background:linear-gradient(135deg,var(--violet),#5ca8f8);
      color:#fff;font-family:var(--fh);font-weight:700;font-size:.83rem;letter-spacing:.3px;
      box-shadow:0 4px 16px rgba(124,92,252,.45);transition:transform .18s,box-shadow .18s;
    }
    .sbtn:hover{transform:scale(1.05);box-shadow:0 6px 24px rgba(124,92,252,.65);}
    .sbtn:active{transform:scale(.97);}
    .sbtn:disabled{opacity:.4;cursor:default;transform:none;}
    .aisug{
      height:36px;padding:0 14px;border-radius:50px;flex-shrink:0;
      border:1px solid rgba(124,92,252,.4);background:rgba(124,92,252,.12);
      color:var(--violet2);font-family:var(--fh);font-weight:600;font-size:.78rem;
      cursor:pointer;white-space:nowrap;transition:all .2s;
    }
    .aisug:hover{background:rgba(124,92,252,.22);border-color:var(--violet);color:#fff;}
    .aisug:disabled{opacity:.4;cursor:default;}
    .mic{
      width:36px;height:36px;border-radius:50%;flex-shrink:0;
      border:1px solid var(--border);background:var(--w06);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;color:var(--w60);transition:all .2s;
    }
    .mic:hover{background:rgba(244,114,182,.15);border-color:var(--rose);color:var(--rose);}
    .mic svg{width:14px;height:14px;stroke:currentColor;}

    @media(max-width:660px){.pl{display:none;}.main{padding:9px;}}
  </style>
</head>
<body>
<div class="orbs"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div><div class="orb o4"></div></div>

<div class="root">
  <nav class="topnav">
    <a href="index.html" class="logo">RoommateSync</a>
    <div class="nav-r">
      <span class="ai-badge">✦ AI Powered</span>
      <a href="find-roommates.html" class="nav-pill">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Back to Matches
      </a>
    </div>
  </nav>

  <div class="main">
    <!-- LEFT -->
    <div class="pl">
      <div class="pl-head">
        <div class="pl-label">Roommate Sync AI</div>
        <div class="pl-title">
          Matches
          <div class="head-acts">
            <div class="ib" title="Filter">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
            </div>
            <div class="ib" title="More">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
            </div>
          </div>
        </div>
      </div>
      <div class="search-wrap">
        <div class="search-inner">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Search matches…"/>
        </div>
      </div>
      <div class="match-list" id="matchList"></div>
    </div>

    <!-- RIGHT -->
    <div class="pr">
      <div class="ct">
        <div class="ct-l">
          <div class="ctav" id="ctav"><span id="ctavE">👤</span><div class="pip"></div></div>
          <div>
            <div class="cname" id="cname">Select a match</div>
            <div class="cocc"  id="cocc">—</div>
          </div>
          <span class="cbadge" id="cbadge" style="display:none"></span>
        </div>
        <div class="ct-r">
          <span class="online-txt">Online</span>
          <div class="ib" title="Video Call">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
          </div>
          <div class="ib" title="Profile">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div class="ib" title="More">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
          </div>
        </div>
      </div>

      <div class="msgs" id="msgs">
        <div class="empty-chat" id="eChat">
          <div class="big">🏠</div>
          <h3>Find your perfect roommate</h3>
          <p>Select a match from the left to start chatting.</p>
        </div>
      </div>

      <div class="ai-acts" id="aiActs" style="display:none">
        <button class="chip rose" onclick="aiChip('Can you analyze our schedules and suggest the best times for us to discuss apartment logistics?')">🧠 1. Analyze schedules</button>
        <button class="chip sky"  onclick="aiChip('What nearby services, transit options, and amenities should I ask about for this location?')">📍 2. Locate nearby services</button>
        <button class="chip teal" onclick="aiChip('Help me calculate a fair split for shared rent and household expenses.')">💰 3. Calculate shared expenses</button>
      </div>

      <div class="cib">
        <div class="att" title="Attach">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </div>
        <div class="iw">
          <input type="text" id="msgInput" placeholder="Type your message…" autocomplete="off" disabled/>
        </div>
        <button class="sbtn" id="sendBtn" disabled>Send</button>
        <button class="aisug" id="aiSugBtn" disabled onclick="aiSuggest()">AI Suggest Reply</button>
        <div class="mic" title="Voice">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(()=>{

  /* ═══════════════════════════════════════════════════
     GEMINI CONFIG
  ═══════════════════════════════════════════════════ */
  const GEMINI_API_KEY = 'AIzaSyCIJrA0NWlUBjbK1d3-6JWrgjD5yuMy6NI';
  const GEMINI_URL     = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`;

  /* ═══════════════════════════════════════════════════
     ROOMMATE DATA  — each profile includes a persona
     that Gemini uses to stay in character
  ═══════════════════════════════════════════════════ */
  const RM = [
    {
      id:1, e:'👨🏾‍💻', name:'Anura Hellon', occ:'Software Engineer', city:'Pune', s:81, on:true, t:'12:35 AM',
      persona: `You are Anura Hellon, a 26-year-old Software Engineer living in Pune, India.
Personality: calm, organized, professional, a bit nerdy but warm.
Lifestyle: early riser (up by 6:30 AM), strictly vegetarian, very clean and tidy, medium budget (₹10k–₹20k/month rent).
Hobbies: cooking South Indian food on weekends, reading tech blogs, occasional hiking.
Looking for: a quiet, clean, respectful roommate who keeps the kitchen tidy and respects early bedtimes.
Reply style: friendly but concise — 1 to 3 short sentences. Speak like a real person texting on a chat app. NO bullet points, NO markdown, NO asterisks. If the user asks something unrelated to being roommates, gently steer back.`
    },
    {
      id:2, e:'👩🏻‍🎨', name:'Javie Muson', occ:'UX Designer', city:'Mumbai', s:89, on:false, t:'11:42 PM',
      persona: `You are Javie Muson, a 27-year-old UX Designer living in Mumbai, India.
Personality: creative, sociable, enthusiastic, slightly spontaneous.
Lifestyle: flexible schedule (sometimes works late on product deadlines), eats everything, keeps shared areas clean, medium-high budget (₹15k–₹25k/month).
Hobbies: sketching, trying new cafes, yoga on weekday mornings, binge-watching design docs.
Looking for: someone easygoing who doesn't mind occasional guests on weekends and enjoys a vibrant home vibe.
Reply style: warm and casual — 1 to 3 sentences, texting tone. NO bullet points, NO markdown, NO asterisks.`
    },
    {
      id:3, e:'👩🏾‍💼', name:'Andra Hellon', occ:'Product Manager', city:'Bangalore', s:75, on:true, t:'12:30 PM',
      persona: `You are Andra Hellon, a 29-year-old Product Manager at a Series C startup in Bangalore, India.
Personality: driven, direct, values privacy and alone-time after long work days.
Lifestyle: unpredictable schedule (can be home by 7 PM or 11 PM), non-vegetarian, moderately clean, high budget (₹20k+/month).
Hobbies: running, podcasts, cooking elaborate dinners on Sundays.
Looking for: an independent, mature roommate who doesn't need constant social interaction and pays rent on time without reminders.
Reply style: direct and concise — 1 to 2 sentences. Professional but not cold. NO bullet points, NO markdown, NO asterisks.`
    },
    {
      id:4, e:'🧕🏽', name:'Henry Emson', occ:'Data Analyst', city:'Delhi', s:23, on:false, t:'10:15 AM',
      persona: `You are Henry Emson, a 24-year-old Data Analyst living in Delhi, India.
Personality: introverted, cautious, polite, budget-conscious.
Lifestyle: flexible sleep schedule, low budget (under ₹10k/month), moderate cleanliness, prefers a quiet home, no strong food preferences.
Hobbies: reading, online gaming, weekend road trips.
Looking for: a low-drama, budget-friendly roommate situation with clear boundaries and split responsibilities.
Reply style: reserved but polite — 1 to 2 sentences. Slightly hesitant tone, asks clarifying questions sometimes. NO bullet points, NO markdown, NO asterisks.`
    },
    {
      id:5, e:'🧑🏿‍🎓', name:'Malia Toktert', occ:'CS Graduate', city:'Hyderabad', s:79, on:true, t:'9:00 AM',
      persona: `You are Malia Toktert, a 23-year-old Computer Science graduate student in Hyderabad, India.
Personality: enthusiastic, optimistic, talkative, studious.
Lifestyle: early bird (up by 6 AM for study sessions), strictly vegetarian, extremely neat, low budget (under ₹10k/month).
Hobbies: competitive coding, cooking simple meals, watching anime, long walks.
Looking for: a clean, non-smoking, vegetarian-friendly roommate who doesn't mind early morning alarm sounds and shares chores fairly.
Reply style: upbeat and friendly — 1 to 3 sentences, uses occasional emojis naturally. NO bullet points, NO markdown, NO asterisks.`
    },
  ];

  /* ═══════════════════════════════════════════════════
     AI SUGGEST STARTER MESSAGES
  ═══════════════════════════════════════════════════ */
  const AS = [
    "Hi! I came across your profile and think we'd be a great match. I'm organized, quiet after 10pm, and love a clean shared space. Would love to chat!",
    "Hey! Your profile caught my eye — we seem to have similar schedules and lifestyle preferences. Want to discuss the living arrangement?",
    "Hello! We're in the same city and looking for similar setups. I work from home 3 days a week — does that fit your schedule?",
  ];

  /* ═══════════════════════════════════════════════════
     UTILS
  ═══════════════════════════════════════════════════ */
  const sk  = id => `rs_chat_${id}`;
  const ld  = id => JSON.parse(localStorage.getItem(sk(id)) || '[]');
  const sv  = (id, ms) => localStorage.setItem(sk(id), JSON.stringify(ms));
  const ft  = ts => new Date(ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  const rnd = a  => a[Math.floor(Math.random() * a.length)];
  const sc  = s  => s >= 75 ? 'shi' : s >= 40 ? 'smi' : 'slo';

  let aid       = null;   // active roommate id
  let isWaiting = false;  // block double-sends while AI responds

  /* ═══════════════════════════════════════════════════
     GEMINI  —  context-aware reply
  ═══════════════════════════════════════════════════ */
  async function callGemini(r, userMessage) {
    // Pull last 12 messages as conversation context
    const history = ld(r.id).slice(-12);

    const contextLines = history.map(m =>
      `${m.from === 'user' ? 'User' : r.name}: ${m.text}`
    ).join('\n');

    const prompt =
`${r.persona}

--- Conversation so far ---
${contextLines.trim() || '(This is the very first message — greet the user naturally.)'}
---------------------------

User just said: "${userMessage}"

Respond as ${r.name}. Stay in character. Be natural, conversational, human. 1–3 sentences maximum. No markdown, no bullet points, no asterisks.`;

    const body = {
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: {
        temperature:     0.88,
        topP:            0.95,
        maxOutputTokens: 160,
      },
      safetySettings: [
        { category: 'HARM_CATEGORY_HARASSMENT',        threshold: 'BLOCK_ONLY_HIGH' },
        { category: 'HARM_CATEGORY_HATE_SPEECH',       threshold: 'BLOCK_ONLY_HIGH' },
        { category: 'HARM_CATEGORY_SEXUALLY_EXPLICIT', threshold: 'BLOCK_ONLY_HIGH' },
        { category: 'HARM_CATEGORY_DANGEROUS_CONTENT', threshold: 'BLOCK_ONLY_HIGH' },
      ]
    };

    try {
      const res = await fetch(GEMINI_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(body),
      });

      if (!res.ok) {
        console.warn('Gemini HTTP error', res.status);
        return smartFallback(r, userMessage);
      }

      const data = await res.json();
      const text = data?.candidates?.[0]?.content?.parts?.[0]?.text?.trim();

      // Strip any accidental markdown asterisks/hashes
      const clean = text
        ? text.replace(/\*\*/g,'').replace(/\*/g,'').replace(/^#+\s*/gm,'').trim()
        : null;

      return clean || smartFallback(r, userMessage);

    } catch (err) {
      console.error('Gemini fetch error:', err);
      return smartFallback(r, userMessage);
    }
  }

  /* ═══════════════════════════════════════════════════
     SMART FALLBACK  —  keyword-based replies
     (used only when Gemini is unreachable)
  ═══════════════════════════════════════════════════ */
  function smartFallback(r, msg) {
    const m = msg.toLowerCase();
    if (/\b(cook|food|eat|meal|kitchen|veg|nonveg|vegan)\b/.test(m))
      return "I usually cook a few nights a week and keep the kitchen clean. What are your food habits like?";
    if (/\b(sleep|morning|night|wake|bed|schedule|early|late)\b/.test(m))
      return "My sleep schedule is pretty consistent. Does your routine work well with that?";
    if (/\b(clean|tidy|mess|dirty|neat|hygiene)\b/.test(m))
      return "Cleanliness is really important to me — I like keeping shared areas tidy. How would you describe yourself on that front?";
    if (/\b(rent|budget|cost|pay|money|afford|price)\b/.test(m))
      return "I've got a clear budget in mind. What range are you comfortable with?";
    if (/\b(pet|dog|cat|animal)\b/.test(m))
      return "I don't have any pets right now. Do you?";
    if (/\b(work|job|office|remote|wfh|home)\b/.test(m))
      return "I split my time between office and home. What does your setup look like?";
    if (/\b(move|when|available|date|timeline)\b/.test(m))
      return "I'm looking to move in within the next few weeks. What's your timeline?";
    if (/\b(hi|hello|hey|sup|yo)\b/.test(m))
      return `Hey! Great to connect 😊 I think we could be a good match — want to tell me a bit about yourself?`;
    return "That's something worth discussing! Let me know more and we can figure out if we'd be a good fit.";
  }

  /* ═══════════════════════════════════════════════════
     MATCH LIST
  ═══════════════════════════════════════════════════ */
  function buildList(f = '') {
    const ml = document.getElementById('matchList');
    ml.innerHTML = '';
    RM.filter(r => r.name.toLowerCase().includes(f.toLowerCase())).forEach(r => {
      const ms = ld(r.id);
      const lm = ms.length ? ms[ms.length - 1] : null;
      const d  = document.createElement('div');
      d.className = 'mi' + (r.id === aid ? ' active' : '');
      d.dataset.id = r.id;
      d.innerHTML = `
        <div class="maw">
          <div class="mav">${r.e}</div>
          ${r.on ? '<div class="opip"></div>' : ''}
        </div>
        <div class="minf">
          <div class="mname">${r.name}</div>
          <div class="mocc">${r.occ}</div>
          <div class="mprev">${lm ? (lm.from === 'user' ? 'You: ' : '') + lm.text : 'Start a conversation'}</div>
        </div>
        <div class="mmeta">
          <span class="mscore ${sc(r.s)}">${r.s}%</span>
          <span class="mtime">${r.t}</span>
          ${ms.length > 0 && ms[ms.length - 1].from === 'other' ? '<div class="udot"></div>' : ''}
        </div>`;
      d.addEventListener('click', () => openChat(r.id));
      ml.appendChild(d);
    });
  }
  buildList();
  document.getElementById('searchInput').addEventListener('input', e => buildList(e.target.value));

  /* ═══════════════════════════════════════════════════
     OPEN CHAT
  ═══════════════════════════════════════════════════ */
  function openChat(id) {
    aid = id;
    const r = RM.find(x => x.id === id);
    document.getElementById('ctavE').textContent = r.e;
    document.getElementById('cname').textContent = r.name;
    document.getElementById('cocc').textContent  = `${r.occ} • ${r.city}`;

    const b = document.getElementById('cbadge');
    b.textContent = `${r.s}% Match`;
    b.style.display = '';
    const styleMap = {
      shi: 'color:#4ade80;border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.1)',
      smi: 'color:#38bdf8;border-color:rgba(56,189,248,.3);background:rgba(56,189,248,.1)',
      slo: 'color:#f472b6;border-color:rgba(244,114,182,.3);background:rgba(244,114,182,.1)',
    };
    b.style.cssText = `margin-left:6px;font-family:var(--fh);font-size:.7rem;font-weight:700;padding:3px 8px;border-radius:50px;border:1px solid;${styleMap[sc(r.s)]}`;

    document.getElementById('msgInput').disabled  = false;
    document.getElementById('sendBtn').disabled   = isWaiting;
    document.getElementById('aiSugBtn').disabled  = isWaiting;
    document.getElementById('aiActs').style.display = '';
    document.getElementById('msgInput').focus();

    buildList();
    renderMsgs(id);
  }

  /* ═══════════════════════════════════════════════════
     RENDER MESSAGES
  ═══════════════════════════════════════════════════ */
  function renderMsgs(id) {
    const w  = document.getElementById('msgs');
    const ms = ld(id);
    const r  = RM.find(x => x.id === id);
    w.innerHTML = '';

    if (!ms.length) {
      const e = document.createElement('div');
      e.className = 'empty-chat';
      e.innerHTML = `<div class="big">${r.e}</div><h3>Say hi to ${r.name}!</h3><p>${r.occ} from ${r.city} — ${r.s}% match.</p>`;
      w.appendChild(e);
    } else {
      const sep = document.createElement('div');
      sep.className = 'dsep'; sep.textContent = 'Today';
      w.appendChild(sep);
      ms.forEach(m => addBubble(m, r, false));
    }

    // typing indicator
    const tr = document.createElement('div');
    tr.className = 'typing-row'; tr.id = 'tr';
    tr.innerHTML = `<div class="mav2">${r.e}</div><div class="tbub"><div class="td"></div><div class="td"></div><div class="td"></div></div>`;
    w.appendChild(tr);

    // show typing indicator if AI is mid-reply for this chat
    if (isWaiting) tr.classList.add('show');
    scrollB();
  }

  /* ═══════════════════════════════════════════════════
     ADD BUBBLE
  ═══════════════════════════════════════════════════ */
  function addBubble(msg, r, anim) {
    const w  = document.getElementById('msgs');
    const ec = w.querySelector('.empty-chat');

    // Replace empty-state with real messages area
    if (ec) {
      w.innerHTML = '';
      const sep = document.createElement('div');
      sep.className = 'dsep'; sep.textContent = 'Today';
      w.appendChild(sep);
      const ntr = document.createElement('div');
      ntr.className = 'typing-row'; ntr.id = 'tr';
      ntr.innerHTML = `<div class="mav2">${r.e}</div><div class="tbub"><div class="td"></div><div class="td"></div><div class="td"></div></div>`;
      w.appendChild(ntr);
    }

    const row = document.createElement('div');
    row.className = `mrow ${msg.from === 'user' ? 'me' : 'other'}`;
    if (!anim) row.style.animationDuration = '0s';

    const av  = document.createElement('div'); av.className = 'mav2';
    av.textContent = msg.from === 'user' ? 'Me' : r.e;

    const col = document.createElement('div'); col.className = 'bcol';
    const bub = document.createElement('div'); bub.className = 'bub';
    bub.textContent = msg.text;

    const ts  = document.createElement('div'); ts.className = 'bts';
    ts.textContent = ft(msg.ts);

    col.appendChild(bub); col.appendChild(ts);
    row.appendChild(av);  row.appendChild(col);

    const cur = document.getElementById('tr');
    if (cur) w.insertBefore(row, cur); else w.appendChild(row);
    if (anim) scrollB();
  }

  /* ═══════════════════════════════════════════════════
     SEND MESSAGE
  ═══════════════════════════════════════════════════ */
  function send(text) {
    if (!aid || !text.trim() || isWaiting) return;
    const t  = text.trim();
    document.getElementById('msgInput').value = '';

    const r  = RM.find(x => x.id === aid);
    const ms = ld(aid);
    const msg = { from: 'user', text: t, ts: Date.now() };
    ms.push(msg);
    sv(aid, ms);
    addBubble(msg, r, true);
    buildList();
    triggerAIReply(r, t);
  }

  /* ═══════════════════════════════════════════════════
     TRIGGER AI REPLY  —  shows typing, calls Gemini
  ═══════════════════════════════════════════════════ */
  function triggerAIReply(r, userMessage) {
    isWaiting = true;

    // Disable inputs while waiting
    document.getElementById('sendBtn').disabled  = true;
    document.getElementById('aiSugBtn').disabled = true;
    document.getElementById('msgInput').disabled = true;

    // Show typing indicator
    const tr = document.getElementById('tr');
    if (tr) tr.classList.add('show');
    scrollB();

    // Realistic human-like delay: 900ms – 2200ms
    const thinkTime = 900 + Math.random() * 1300;

    setTimeout(async () => {
      // Call Gemini
      const replyText = await callGemini(r, userMessage);

      // Hide typing indicator
      const tr2 = document.getElementById('tr');
      if (tr2) tr2.classList.remove('show');

      // Only append if user hasn't switched to another chat
      if (aid === r.id) {
        const ms  = ld(r.id);
        const rep = { from: 'other', text: replyText, ts: Date.now() };
        ms.push(rep);
        sv(r.id, ms);
        addBubble(rep, r, true);
        buildList();
      }

      // Re-enable inputs
      isWaiting = false;
      document.getElementById('sendBtn').disabled  = false;
      document.getElementById('aiSugBtn').disabled = false;
      document.getElementById('msgInput').disabled = false;
      document.getElementById('msgInput').focus();

    }, thinkTime);
  }

  /* ═══════════════════════════════════════════════════
     AI CHIP  &  AI SUGGEST
  ═══════════════════════════════════════════════════ */
  window.aiChip    = p => { if (aid) send(p); };
  window.aiSuggest = () => {
    if (!aid) return;
    document.getElementById('msgInput').value = rnd(AS);
    document.getElementById('msgInput').focus();
  };

  /* ═══════════════════════════════════════════════════
     EVENT LISTENERS
  ═══════════════════════════════════════════════════ */
  document.getElementById('sendBtn').addEventListener('click', () =>
    send(document.getElementById('msgInput').value)
  );
  document.getElementById('msgInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(e.target.value); }
  });

  function scrollB() {
    const w = document.getElementById('msgs');
    requestAnimationFrame(() => w.scrollTo({ top: w.scrollHeight, behavior: 'smooth' }));
  }

  /* ═══════════════════════════════════════════════════
     SEED DEMO MESSAGES  (first launch only)
  ═══════════════════════════════════════════════════ */
  if (!ld(1).length) {
    sv(1, [
      { from:'user',  text:'Hi there! I was browsing apartments, this place looks perfect.',             ts: Date.now()-500000 },
      { from:'other', text:"Yes, it's very spacious and close to the subway.",                           ts: Date.now()-480000 },
      { from:'user',  text:'Also, did you have a chance to look at the apartment I sent? Let me know!',  ts: Date.now()-300000 },
      { from:'other', text:"No problem, take your time! I'm around whenever. Let's find a slot.",        ts: Date.now()-200000 },
    ]);
  }
  openChat(1);

})();
</script>
</body>
</html>
