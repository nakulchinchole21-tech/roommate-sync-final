<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roommate Profile — Roommate Sync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:         #080c18;
      --bg-mid:          #0d1426;
      --glass-bg:        rgba(255,255,255,0.045);
      --glass-border:    rgba(255,255,255,0.10);
      --glass-hover:     rgba(255,255,255,0.075);
      --accent-violet:   #7c5cfc;
      --accent-sky:      #38bdf8;
      --accent-rose:     #f472b6;
      --accent-teal:     #2dd4bf;
      --accent-amber:    #fbbf24;
      --text-primary:    #f0f4ff;
      --text-secondary:  #8892aa;
      --text-muted:      #4a5568;
      --radius-lg:       20px;
      --radius-xl:       28px;
      --radius-full:     9999px;
      --transition:      0.3s cubic-bezier(0.4,0,0.2,1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* ─── Background ─── */
    .bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(90px); opacity: 0.3;
      animation: drift 20s ease-in-out infinite alternate;
    }
    .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, #7c5cfc, transparent 70%); top: -160px; left: -120px; animation-delay: 0s; }
    .orb-2 { width: 480px; height: 480px; background: radial-gradient(circle, #38bdf8, transparent 70%); top: 40%; right: -100px; animation-delay: -7s; }
    .orb-3 { width: 400px; height: 400px; background: radial-gradient(circle, #f472b6, transparent 70%); bottom: 5%; left: 15%; animation-delay: -14s; }
    .orb-4 { width: 320px; height: 320px; background: radial-gradient(circle, #2dd4bf, transparent 70%); bottom: -80px; right: 15%; animation-delay: -5s; }
    @keyframes drift {
      0%   { transform: translate(0,0) scale(1); }
      50%  { transform: translate(28px,-36px) scale(1.06); }
      100% { transform: translate(-18px,22px) scale(0.96); }
    }
    .grain {
      position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    /* ─── Page wrapper ─── */
    .page-wrapper { position: relative; z-index: 2; min-height: 100vh; display: flex; flex-direction: column; }

    /* ─── Nav ─── */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 40px;
      background: rgba(8,12,24,0.75);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--glass-border);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Outfit', sans-serif; font-size: 1.3rem; font-weight: 700;
      letter-spacing: -0.02em; text-decoration: none; color: var(--text-primary);
    }
    .nav-logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent-violet), var(--accent-sky));
      border-radius: 10px; display: grid; place-items: center; font-size: 1rem;
    }
    .nav-logo span { background: linear-gradient(135deg, var(--accent-violet), var(--accent-sky)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .nav-right { display: flex; align-items: center; gap: 14px; }
    .btn-back {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 20px;
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: var(--radius-full); color: var(--text-secondary);
      font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 500;
      cursor: pointer; text-decoration: none; transition: var(--transition);
    }
    .btn-back:hover { background: var(--glass-hover); color: var(--text-primary); border-color: rgba(255,255,255,0.2); }
    .nav-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-violet), var(--accent-rose));
      display: grid; place-items: center;
      font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.9rem;
      cursor: pointer; border: 2px solid var(--glass-border); transition: var(--transition);
    }
    .nav-avatar:hover { border-color: var(--accent-violet); box-shadow: 0 0 16px rgba(124,92,252,0.4); }

    /* ─── Main Content ─── */
    .main-content {
      max-width: 1100px; margin: 0 auto; width: 100%;
      padding: 48px 40px 80px;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 28px;
      align-items: start;
    }

    /* ─── Glass panel base ─── */
    .glass-panel {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      position: relative; overflow: hidden;
    }
    .glass-panel::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ─── LEFT COLUMN ─── */
    .left-col { display: flex; flex-direction: column; gap: 20px; }

    /* Profile hero card */
    .profile-hero { padding: 36px 28px 28px; text-align: center; }
    .profile-hero-glow {
      position: absolute; inset: -40px;
      background: radial-gradient(ellipse at 50% 0%, rgba(124,92,252,0.2), transparent 65%);
      pointer-events: none;
    }
    .avatar-outer {
      display: inline-flex; align-items: center; justify-content: center;
      width: 100px; height: 100px;
      border-radius: 28px;
      padding: 3px;
      background: linear-gradient(135deg, var(--accent-violet), var(--accent-sky));
      margin-bottom: 20px;
      box-shadow: 0 0 40px rgba(124,92,252,0.35);
      position: relative; z-index: 1;
    }
    .avatar-inner {
      width: 100%; height: 100%;
      border-radius: 24px;
      display: grid; place-items: center;
      font-size: 2.8rem;
    }
    .profile-name {
      font-family: 'Outfit', sans-serif;
      font-size: 1.55rem; font-weight: 800;
      letter-spacing: -0.025em;
      background: linear-gradient(135deg, #fff 0%, #c4b5fd 60%, #7dd3fc 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 4px; position: relative; z-index: 1;
    }
    .profile-role {
      font-size: 0.9rem; color: var(--text-secondary); font-weight: 500;
      margin-bottom: 4px; position: relative; z-index: 1;
    }
    .profile-location {
      font-size: 0.82rem; color: var(--text-muted);
      display: flex; align-items: center; justify-content: center; gap: 4px;
      margin-bottom: 20px; position: relative; z-index: 1;
    }

    /* Score ring */
    .score-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      margin-bottom: 20px; position: relative; z-index: 1;
    }
    .score-ring-outer { position: relative; width: 100px; height: 100px; }
    .score-ring-outer svg { transform: rotate(-90deg); }
    .ring-bg  { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 6; }
    .ring-fill {
      fill: none; stroke-width: 6; stroke-linecap: round;
      transition: stroke-dashoffset 1.4s cubic-bezier(0.25,1,0.5,1);
    }
    .score-ring-label {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: 'Outfit', sans-serif;
    }
    .score-num { font-size: 1.6rem; font-weight: 800; line-height: 1; }
    .score-pct { font-size: 0.62rem; color: var(--text-muted); letter-spacing: 0.06em; margin-top: 1px; }
    .score-caption { font-size: 0.78rem; color: var(--text-secondary); }
    .match-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 14px; border-radius: var(--radius-full);
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
      position: relative; z-index: 1;
    }
    .badge-excellent { background: rgba(52,211,153,0.12); color: #34d399; border: 1px solid rgba(52,211,153,0.22); }
    .badge-good      { background: rgba(56,189,248,0.12); color: #38bdf8; border: 1px solid rgba(56,189,248,0.22); }
    .badge-moderate  { background: rgba(251,191,36,0.12); color: #fbbf24; border: 1px solid rgba(251,191,36,0.22); }

    /* Divider */
    .divider { height: 1px; background: var(--glass-border); margin: 20px 0; }

    /* Quick info pills */
    .quick-info { display: flex; flex-direction: column; gap: 10px; position: relative; z-index: 1; }
    .info-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
    }
    .info-row-left { display: flex; align-items: center; gap: 9px; font-size: 0.82rem; color: var(--text-muted); }
    .info-row-icon { font-size: 1rem; }
    .info-row-val { font-size: 0.85rem; font-weight: 500; color: var(--text-primary); }

    /* Action buttons card */
    .actions-card { padding: 22px 24px; }
    .actions-title {
      font-family: 'Outfit', sans-serif; font-size: 0.78rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted);
      margin-bottom: 14px;
    }
    .btn-primary {
      width: 100%; padding: 13px 20px;
      background: linear-gradient(135deg, var(--accent-violet), var(--accent-sky));
      border: none; border-radius: 14px;
      color: #fff; font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem; font-weight: 600;
      cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-bottom: 10px;
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-2px); box-shadow: 0 10px 28px rgba(124,92,252,0.38); }
    .btn-primary:disabled { opacity: 0.7; cursor: default; transform: none; box-shadow: none; }
    .btn-secondary {
      width: 100%; padding: 12px 20px;
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: 14px; color: var(--text-secondary);
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500;
      cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-secondary:hover { background: var(--glass-hover); color: var(--text-primary); border-color: rgba(255,255,255,0.2); }
    .btn-secondary.saved { color: var(--accent-rose); border-color: rgba(244,114,182,0.3); }

    /* ─── RIGHT COLUMN ─── */
    .right-col { display: flex; flex-direction: column; gap: 20px; }

    /* Section header */
    .section-header {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 700;
      color: var(--text-primary); margin-bottom: 18px; letter-spacing: -0.01em;
    }
    .section-icon {
      width: 32px; height: 32px; border-radius: 9px;
      display: grid; place-items: center; font-size: 0.9rem; flex-shrink: 0;
    }

    /* Bio card */
    .bio-card { padding: 28px; }
    .bio-text { font-size: 0.95rem; color: var(--text-secondary); line-height: 1.75; }
    .bio-highlight {
      display: inline; background: rgba(124,92,252,0.1);
      border-bottom: 1px solid rgba(124,92,252,0.3);
      color: #c4b5fd; padding: 0 3px; border-radius: 3px;
    }

    /* Lifestyle cards grid */
    .lifestyle-card { padding: 28px; }
    .lifestyle-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    .ls-item {
      padding: 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      transition: var(--transition);
      cursor: default;
    }
    .ls-item:hover { background: rgba(255,255,255,0.055); border-color: rgba(255,255,255,0.13); transform: translateY(-2px); }
    .ls-item-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .ls-icon {
      width: 36px; height: 36px; border-radius: 10px;
      display: grid; place-items: center; font-size: 1rem; flex-shrink: 0;
    }
    .ls-label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); }
    .ls-value { font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 700; color: var(--text-primary); }
    .ls-match-tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: var(--radius-full);
      font-size: 0.7rem; font-weight: 600;
      margin-top: 8px;
    }
    .match-yes { background: rgba(52,211,153,0.1); color: #34d399; border: 1px solid rgba(52,211,153,0.2); }
    .match-no  { background: rgba(251,191,36,0.1);  color: #fbbf24; border: 1px solid rgba(251,191,36,0.2); }

    /* Progress bars & Chart container */
    .compat-card { padding: 28px; }
    .progress-list { display: flex; flex-direction: column; gap: 20px; }
    .progress-item {}
    .progress-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .progress-label { display: flex; align-items: center; gap: 8px; font-size: 0.875rem; font-weight: 500; color: var(--text-secondary); }
    .progress-label-icon { font-size: 1rem; }
    .progress-pct { font-family: 'Outfit', sans-serif; font-size: 0.9rem; font-weight: 700; }
    .progress-track {
      height: 7px; background: rgba(255,255,255,0.06);
      border-radius: var(--radius-full); overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: var(--radius-full);
      width: 0%;
      transition: width 1.3s cubic-bezier(0.25,1,0.5,1);
    }
    .chart-container {
      margin-top: 30px;
      position: relative;
      height: 250px;
      width: 100%;
    }

    /* AI Insight / Icebreaker common output styling */
    .insight-card { padding: 28px; }
    .insight-intro { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 18px; }
    .btn-generate {
      padding: 12px 24px;
      background: linear-gradient(135deg, rgba(124,92,252,0.2), rgba(56,189,248,0.15));
      border: 1px solid rgba(124,92,252,0.35);
      border-radius: 14px; color: #c4b5fd;
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; gap: 8px;
    }
    .btn-generate:hover { background: linear-gradient(135deg, rgba(124,92,252,0.32), rgba(56,189,248,0.22)); box-shadow: 0 0 24px rgba(124,92,252,0.2); }
    .btn-generate:disabled { opacity: 0.5; cursor: default; }
    
    .insight-output {
      margin-top: 18px;
      padding: 18px;
      background: rgba(124,92,252,0.06);
      border: 1px solid rgba(124,92,252,0.18);
      border-radius: 16px;
      display: none;
      animation: fadeUp 0.35s ease;
    }
    .insight-output.visible { display: block; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .insight-output-header {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
      color: #a78bfa; margin-bottom: 10px;
    }
    .insight-spinner {
      width: 13px; height: 13px;
      border: 2px solid rgba(124,92,252,0.25); border-top-color: var(--accent-violet);
      border-radius: 50%; animation: spin 0.7s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .insight-body { font-size: 0.88rem; color: #c4b5fd; line-height: 1.72; white-space: pre-wrap; }

    /* Tags cluster */
    .tags-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
    .tag {
      padding: 4px 13px; border-radius: var(--radius-full);
      font-size: 0.75rem; font-weight: 500;
      display: flex; align-items: center; gap: 4px;
    }
    .tag-sleep  { background:rgba(124,92,252,0.1); color:#a78bfa; border:1px solid rgba(124,92,252,0.18); }
    .tag-food   { background:rgba(249,115,22,0.1); color:#fb923c; border:1px solid rgba(249,115,22,0.18); }
    .tag-clean  { background:rgba(56,189,248,0.1); color:#38bdf8; border:1px solid rgba(56,189,248,0.18); }
    .tag-budget { background:rgba(52,211,153,0.1); color:#34d399; border:1px solid rgba(52,211,153,0.18); }

    /* Not found state */
    .not-found {
      max-width: 480px; margin: 100px auto; text-align: center; padding: 20px;
    }
    .not-found-icon { font-size: 4rem; margin-bottom: 16px; opacity: 0.5; }
    .not-found h2 { font-family:'Outfit',sans-serif; font-size:1.5rem; font-weight:700; margin-bottom:10px; }
    .not-found p { color: var(--text-secondary); margin-bottom: 24px; }

    /* ─── Responsive ─── */
    @media (max-width: 900px) {
      .main-content { grid-template-columns: 1fr; padding: 32px 24px 60px; }
      .left-col { display: grid; grid-template-columns: 1fr 1fr; }
      .profile-hero { grid-column: 1 / -1; }
    }
    @media (max-width: 600px) {
      nav { padding: 14px 18px; }
      .main-content { padding: 24px 16px 50px; }
      .left-col { grid-template-columns: 1fr; }
      .lifestyle-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

/* ════════════════════════════════════════════
    HELPERS
════════════════════════════════════════════ */
function getUserPrefs() {
  return {
    sleep:  localStorage.getItem('sleep')  || null,
    food:   localStorage.getItem('food')   || null,
    clean:  localStorage.getItem('clean')  || null,
    budget: localStorage.getItem('budget') || null,
  };
}

function calcScore(up, profile) {
  let s = 0;
  if (up.sleep  && up.sleep  === profile.prefs.sleep)  s += 25;
  if (up.food   && up.food   === profile.prefs.food)   s += 25;
  if (up.clean  && up.clean  === profile.prefs.clean)  s += 25;
  if (up.budget && up.budget === profile.prefs.budget) s += 25;
  if (!up.sleep && !up.food && !up.clean && !up.budget)
    s = Math.floor(Math.random() * 35 + 60);
  return s;
}

function ringColor(s) {
  if (s >= 86) return '#34d399';
  if (s >= 71) return '#38bdf8';
  return '#fbbf24';
}

function matchInfo(s) {
  if (s >= 86) return { label:'Excellent Match', cls:'badge-excellent', icon:'⭐' };
  if (s >= 71) return { label:'Good Match',      cls:'badge-good',      icon:'✓'  };
  return              { label:'Moderate Match',  cls:'badge-moderate',  icon:'~'  };
}

function dimScore(up, profile, key) {
  if (!up[key]) return Math.floor(Math.random() * 30 + 60);
  return up[key] === profile.prefs[key] ? 100 : Math.floor(Math.random() * 25 + 30);
}

const DIM_META = {
  sleep:  { icon:'🌙', label:'Sleep Schedule',  color:'linear-gradient(90deg,#7c5cfc,#a78bfa)' },
  food:   { icon:'🍽️', label:'Food Preference', color:'linear-gradient(90deg,#f97316,#fb923c)' },
  clean:  { icon:'✨', label:'Cleanliness',      color:'linear-gradient(90deg,#38bdf8,#7dd3fc)' },
  budget: { icon:'💰', label:'Budget Range',     color:'linear-gradient(90deg,#34d399,#6ee7b7)' },
};
